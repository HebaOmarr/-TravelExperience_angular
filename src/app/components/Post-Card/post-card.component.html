<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  
<a [routerLink]="['/post-details', post.PostId]" class="text-decoration-none text-dark">
  <div class="card h-100 shadow-sm border-0 rounded-3 overflow-hidden transition-all hover:shadow-md">
    <!-- Image with number badge -->
    <div class="position-relative">
      <img class="card-img-top w-100" 
           [src]="post.PlaceImage" 
           alt="{{ post.PlaceName }}"
           style="height: 180px; object-fit: cover;">
    </div>

    <div class="card-body p-3">
      <div class="d-flex justify-content-between align-items-start mb-2">
        <h5 class="card-title fw-bold mb-0" style="font-size: 1rem;">
          {{ post.PlaceName }}
        </h5>
        <div class="d-flex align-items-center bg-light px-2 py-1 rounded-3">
          <i class="bi bi-star-fill text-warning me-1" style="font-size: 0.8rem;"></i>
          <span class="fw-bold" style="font-size: 0.8rem;">{{ post.Rate }}</span>
        </div>
      </div>

      <p class="card-text text-muted mb-2" style="font-size: 0.85rem; line-height: 1.4;">
        {{ post.PostText}}
      </p>

      <div class="d-flex justify-content-between align-items-center mt-2">
        <div class="d-flex align-items-center text-muted" style="font-size: 0.75rem;">
          <i class="bi bi-geo-alt-fill me-1"></i>
          <span>Lampedusa, Italy</span>
        </div>

      </div>
    </div>
  </div>
</a>
