<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<div class="container my-5">

  <div class="position-relative mb-5">
    <img [src]="place.PlaceImage" class="w-100 rounded-4 shadow"
      style="height: 400px; object-fit: cover;" alt="{{ place.PlaceName }}">

    <div
      class="position-absolute top-50 start-50 translate-middle text-white text-center px-4">
      <h1
        class="fw-bold display-4 mb-3 bg-opacity-50 rounded-3 px-3 py-2 text-white text-shadow">
        {{ place.PlaceName }}
      </h1>
      <p
        class="fs-5 bg-opacity-50 rounded-3 px-4 py-2 text-shadow text-white">
        {{ place.PlaceDescription }}
      </p>
    </div>
  </div>

  <div class="container mt-5">
    <div class="row mb-4 align-items-center">
      <div class="col-md-8 mb-2 mb-md-0">
        <h3 class="fw-bold text-dark mb-0">Related Posts</h3>
      </div>
      <div class="col-md-4">
        <div
          class="input-group search-container shadow-sm rounded-pill overflow-hidden">
          <span class="input-group-text bg-white border-0 ps-4 pe-2">
            <i class="bi bi-search text-muted fs-5"></i>
          </span>
          <input #inputSearch
            type="text"
            name="searchPost"
            id="searchPost"
            class="form-control border-0 py-3 px-0 shadow-none"
            placeholder="Search for a post..."
            (input)="PostFilter(inputSearch.value)">
        </div>
      </div>
    </div>
    <div class="container my-5">
      <div class="row g-4">
        @for (item of postsList; track item.PostId)
        {
        <div class="col-md-6 col-lg-4">
          <app-post-card [post]="item"></app-post-card>
        </div>
        } @empty {
        <p class="text-center text-muted fs-4 mt-5">Posts are empty 😢</p>
        }
      </div>

    </div>

    <div class="row mt-5">
      <div class="col-12 d-flex justify-content-center my-3">
        <button class="see-more-btn"
          (click)="LoadMorePosts()"
          [disabled]="!hasMore || isLoadingMore">
          {{ isLoadingMore ? 'Loading...' : hasMore ? 'See More' :
          'No More Posts'
          }}
        </button>
      </div>
    </div>
  </div>
