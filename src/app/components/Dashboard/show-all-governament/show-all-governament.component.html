<div class="container-fluid mt-4">
  <div class="row">
    <div class="col-12">
      <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0">All Government</h4>

          <div
            class="d-flex flex-wrap justify-content-center align-items-center gap-3 p-3"
          >
            <div class="input-group" style="width: 350px">
              <input
                type="text"
                class="form-control border-end-0 py-2 px-3"
                placeholder="Search products..."
                style="border-radius: 6px 0 0 6px !important"
                [(ngModel)]="searchTerm"
              />
              <button
                class="btn btn-primary px-3"
                type="button"
                style="border-radius: 0 6px 6px 0 !important"
                (click)="search()"
              >
                <i class="bi bi-search"></i>
                <span class="ms-2 d-none d-sm-inline">Search</span>
              </button>
            </div>
            <button class="btn btn-primary" [routerLink]="['/gov/0/edit']">
              <i class="bi bi-plus-lg me-1"></i> Add Government
            </button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>longitude</th>
                <th>Latitude</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              @for(pro of FliteredList; track pro.id) {
              <tr>
                <td>{{ pro.id }}</td>
                <td>
                  <div class="d-flex align-items-center">
                    <img
                      [src]="pro.image"
                      alt="Product"
                      class="product-img me-3"
                      style="width: 100px; height: 50px; object-fit: cover"
                    />
                    <div>
                      <h6 class="mb-0">{{ pro.name }}</h6>
                    </div>
                  </div>
                </td>
                <td>{{ pro.description }}</td>
                <td>{{ pro.latitude }}</td>
                <td>
                  {{ pro.longitude }}
                </td>
                <td class="gap-3">
                  <button class="btn btn-sm btn-primary me-2" title="View"   [routerLink]="['/govDetails', pro.id]">
                    <i class="fas fa-eye"></i>
                  </button>
                  <button
                    class="btn btn-sm btn-warning text-white me-2"
                    [routerLink]="['/gov', pro.id, 'edit']"
                    title="Edit"
                  >
                    <i class="fas fa-pen"></i>
                  </button>
                  <button
                    class="btn btn-sm btn-danger me-2"
                    (click)="delete(pro.id)"
                    title="Delete"
                  >
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
